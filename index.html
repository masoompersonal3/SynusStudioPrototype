<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    
    <!-- Content Security Policy to prevent XSS (Allows inline scripts/styles for this build, but blocks external execution) -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; media-src 'self' data: https:;" />

    <!-- SEO & Identity -->
    <title>Synus Studio | Digital Agency & Web Applications</title>
    <meta name="description" content="Synus Studio is a premium digital agency specializing in full-stack web applications, app development, and creative solutions built for real impact." />
    <meta name="keywords" content="Synus Studio, Web Development, App Development, Digital Agency, React, Portfolio, Tech Solutions" />
    <meta name="author" content="Synus Studio" />
    
    <!-- Open Graph / Social Media -->
    <meta property="og:title" content="Synus Studio | Premium Digital Agency" />
    <meta property="og:description" content="We turn thoughtful ideas into meaningful solutions that create real results and transform them into extraordinary realities." />
    <meta property="og:type" content="website" />
    
    <!-- Custom SVG Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'><rect width='40' height='40' rx='12' fill='%23ff3300'/><path d='M19 13C16 13 14 14.5 14 17C14 20.5 20 19.5 20 23C20 25.5 18 27 15 27' stroke='white' stroke-width='3.5' stroke-linecap='round' stroke-linejoin='round'/><path d='M27 13C24 13 22 14.5 22 17C22 20.5 28 19.5 28 23C28 25.5 26 27 23 27' stroke='black' stroke-width='3.5' stroke-linecap='round' stroke-linejoin='round'/></svg>" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body oncontextmenu="return false;" onselectstart="return false;" ondragstart="return false;">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    
    <!-- Anti-Theft / Anti-Inspect Script -->
    <script>
      // Disable Right Click
      document.addEventListener('contextmenu', event => event.preventDefault());
      
      // Disable Keyboard Shortcuts (F12, Ctrl+Shift+I, Ctrl+Shift+J, Ctrl+U, Ctrl+C)
      document.onkeydown = function(e) {
        if (
          e.keyCode === 123 || // F12
          (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74)) || // Ctrl+Shift+I / J
          (e.ctrlKey && e.keyCode === 85) || // Ctrl+U
          (e.ctrlKey && e.keyCode === 67) || // Ctrl+C
          (e.ctrlKey && e.keyCode === 83) || // Ctrl+S
          (e.metaKey && e.altKey && e.keyCode === 73) // Cmd+Option+I (Mac)
        ) {
          e.preventDefault();
          return false;
        }
      };
    </script>
  </body>
</html>
